  # =========================================================================
  # COMPUTE GPU — gce_instance with GPU attached (BETA, may change)
  # Note: all compute.googleapis.com/instance/gpu/* metrics are currently BETA.
  # The Ops Agent publishes a different set (agent.googleapis.com/gpu/*) which
  # covers utilization/memory traditionally — add those if you run Ops Agent.
  # =========================================================================

  "compute.googleapis.com/instance/gpu/sm_utilization":
    kind: resource_utilization
    unit: percent
    better_direction: down
    keywords: [vm, gce, instance, server, hardware]
    saturation_cap: 100
    slo_threshold: 90
    related_metrics:
      - "compute.googleapis.com/instance/gpu/temperature"
      - "compute.googleapis.com/instance/gpu/power_consumption"

  "compute.googleapis.com/instance/gpu/temperature":
    # Thermal throttling typically kicks in around 85-90°C. Alert earlier
    # to catch runaway thermal conditions before performance degrades.
    kind: saturation
    unit: celsius
    better_direction: down
    keywords: [vm, gce, instance, server, hardware]
    slo_threshold: 85
    related_metrics:
      - "compute.googleapis.com/instance/gpu/sm_utilization"
      - "compute.googleapis.com/instance/gpu/power_consumption"
      - "compute.googleapis.com/instance/gpu/tlimit"

  "compute.googleapis.com/instance/gpu/power_consumption":
    kind: resource_utilization
    unit: watts
    better_direction: none
    keywords: [vm, gce, instance, server, hardware]
    related_metrics:
      - "compute.googleapis.com/instance/gpu/sm_utilization"
      - "compute.googleapis.com/instance/gpu/temperature"
      - "compute.googleapis.com/instance/gpu/tlimit"

  "compute.googleapis.com/instance/gpu/tlimit":
    # Thermal margin = slowdown_threshold - current_temp. Low margin means
    # the GPU is about to start throttling. DirectionUp: more margin is better.
    kind: saturation
    unit: celsius
    better_direction: up
    keywords: [vm, gce, instance, server, hardware]
    slo_threshold: 5
    related_metrics:
      - "compute.googleapis.com/instance/gpu/temperature"
