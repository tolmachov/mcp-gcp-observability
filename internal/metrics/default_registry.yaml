  # MEMORYSTORE FOR REDIS (redis_instance)
  # =========================================================================

  "redis.googleapis.com/stats/memory/usage_ratio":
    kind: saturation
    unit: ratio
    better_direction: down
    keywords: [cache, kv, memorystore]
    saturation_cap: 1.0
    slo_threshold: 0.85
    related_metrics:
      - "redis.googleapis.com/stats/evicted_keys"
      - "redis.googleapis.com/clients/connected"

  "redis.googleapis.com/stats/memory/system_memory_overload_duration":
    # Any time spent in overload mode is significant.
    kind: saturation
    unit: microseconds
    better_direction: down
    keywords: [cache, kv, memorystore]
    slo_threshold: 0
    related_metrics:
      - "redis.googleapis.com/stats/memory/system_memory_usage_ratio"
      - "redis.googleapis.com/stats/memory/usage_ratio"
      - "redis.googleapis.com/stats/evicted_keys"

  "redis.googleapis.com/stats/memory/system_memory_usage_ratio":
    # System-level memory pressure (includes Redis + OS + background work),
    # distinct from stats/memory/usage_ratio which is maxmemory-relative.
    kind: resource_utilization
    unit: ratio
    better_direction: down
    keywords: [cache, kv, memorystore]
    saturation_cap: 1.0
    slo_threshold: 0.90
    related_metrics:
      - "redis.googleapis.com/stats/memory/usage_ratio"
      - "redis.googleapis.com/stats/memory/system_memory_overload_duration"

  "redis.googleapis.com/stats/cpu_utilization_main_thread":
    # CPU seconds consumed by the Redis main thread. Redis is single-threaded
    # for most commands so this saturates before stats/memory does.
    kind: resource_utilization
    unit: ratio
    better_direction: down
    keywords: [cache, kv, memorystore]
    saturation_cap: 1.0
    slo_threshold: 0.80
    related_metrics:
      - "redis.googleapis.com/commands/calls"
      - "redis.googleapis.com/stats/connections/total"
      - "redis.googleapis.com/clients/connected"

  "redis.googleapis.com/stats/connections/total":
    kind: throughput
    unit: count
    better_direction: none
    keywords: [cache, kv, memorystore]
    related_metrics:
      - "redis.googleapis.com/clients/connected"
      - "redis.googleapis.com/stats/reject_connections_count"

  "redis.googleapis.com/stats/reject_connections_count":
    # Connections rejected because maxclients was hit. Non-zero = scale up.
    kind: error_rate
    unit: count
    better_direction: down
    keywords: [cache, kv, memorystore]
    slo_threshold: 0
    related_metrics:
      - "redis.googleapis.com/clients/connected"

  "redis.googleapis.com/clients/connected":
    # Redis default maxclients is 65000. Alert well before.
    kind: saturation
    unit: count
    better_direction: down
    keywords: [cache, kv, memorystore]
    slo_threshold: 60000
    related_metrics:
      - "redis.googleapis.com/stats/connections/total"
      - "redis.googleapis.com/stats/reject_connections_count"
      - "redis.googleapis.com/clients/blocked"

  "redis.googleapis.com/clients/blocked":
    # Clients blocked on BLPOP/BRPOP/BLMOVE/etc. Growing = consumer backlog.
    kind: saturation
    unit: count
    better_direction: down
    keywords: [cache, kv, memorystore]
    related_metrics:
      - "redis.googleapis.com/clients/connected"
      - "redis.googleapis.com/commands/calls"

  "redis.googleapis.com/stats/cache_hit_ratio":
    # Below 0.90 usually means cache is undersized or query patterns shifted.
    kind: business_kpi
    unit: ratio
    better_direction: up
    keywords: [cache, kv, memorystore]
    slo_threshold: 0.90
    related_metrics:
      - "redis.googleapis.com/stats/keyspace_hits"
      - "redis.googleapis.com/stats/keyspace_misses"
      - "redis.googleapis.com/stats/evicted_keys"
    # Ratio metric: the business_kpi default is sum, but summing hit ratios
    # across replicas/shards produces values >1 which are meaningless.
    aggregation:
      across_groups: mean

  "redis.googleapis.com/stats/evicted_keys":
    # Sustained non-zero = memory pressure forcing evictions.
    kind: saturation
    unit: count
    better_direction: down
    keywords: [cache, kv, memorystore]
    slo_threshold: 0
    related_metrics:
      - "redis.googleapis.com/stats/memory/usage_ratio"

  "redis.googleapis.com/stats/expired_keys":
    kind: throughput
    unit: count
    better_direction: none
    keywords: [cache, kv, memorystore]
    related_metrics:
      - "redis.googleapis.com/stats/evicted_keys"
      - "redis.googleapis.com/stats/memory/usage_ratio"

  "redis.googleapis.com/stats/keyspace_hits":
    kind: throughput
    unit: count
    better_direction: none
    keywords: [cache, kv, memorystore]
    related_metrics:
      - "redis.googleapis.com/stats/keyspace_misses"
      - "redis.googleapis.com/stats/cache_hit_ratio"
      - "redis.googleapis.com/commands/calls"

  "redis.googleapis.com/stats/keyspace_misses":
    kind: throughput
    unit: count
    better_direction: none
    keywords: [cache, kv, memorystore]
    related_metrics:
      - "redis.googleapis.com/stats/keyspace_hits"
      - "redis.googleapis.com/stats/cache_hit_ratio"
      - "redis.googleapis.com/stats/evicted_keys"

  "redis.googleapis.com/commands/calls":
    # Per-command counters — use top_contributors with metric.labels.cmd.
    kind: throughput
    unit: count
    better_direction: none
    keywords: [cache, kv, memorystore]
    related_metrics:
      - "redis.googleapis.com/stats/cpu_utilization_main_thread"
      - "redis.googleapis.com/stats/keyspace_hits"
      - "redis.googleapis.com/stats/keyspace_misses"

  "redis.googleapis.com/replication/offset_diff":
