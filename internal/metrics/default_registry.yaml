# GCP metrics semantic registry — shipped default set. This file is embedded
# into the binary via //go:embed in internal/metrics/registry.go and is the
# single source of truth for the shipped registry. To override entries at
# runtime, pass --metrics-registry your-overlay.yaml (field-level merge).
#
# This feeds metrics_snapshot / metrics_top_contributors / metrics_related /
# metrics_compare. Metrics not listed here fall back to the registry's
# auto-detector in internal/metrics/registry.go, which only matches on name
# substrings and cannot set slo_threshold / saturation_cap / related_metrics.
#
# -------------------------------------------------------------------------
# User overlay semantics (when passing --metrics-registry user.yaml)
# -------------------------------------------------------------------------
# The user file is MERGED on top of these defaults at the FIELD level:
#
#   - Metrics you don't mention in the user file keep their defaults here.
#   - Metrics you do mention are merged field-by-field: only the fields
#     you explicitly set override the embedded ones; everything you leave
#     out survives from the default. You do NOT have to copy the whole
#     entry to override a single slo_threshold.
#   - related_metrics is EXTENDED, not replaced: your additions are
#     appended to the embedded list (dedupe preserves order).
#   - Nested thresholds are also field-level merged — overriding
#     spike_zscore alone will not wipe the other three thresholds.
#   - A metric that doesn't exist here at all (e.g. a custom app metric)
#     must still provide the required fields (kind, better_direction) in
#     the user file; partial entries for brand-new metrics are rejected.
#
# -------------------------------------------------------------------------
# Fields per entry
# -------------------------------------------------------------------------
#   kind               — semantic kind (latency, throughput, error_rate,
#                        resource_utilization, saturation, availability,
#                        freshness, business_kpi). Drives default thresholds
#                        from internal/metrics/types.go:defaultThresholds.
#   unit               — human-readable unit. Display only; does not affect math.
#   better_direction   — "down" (lower is better), "up" (higher is better),
#                        or "none" (no directional preference).
#   slo_threshold      — optional; enables SLO-breach features (breach_ratio,
#                        step/sustained regression, recovery, flapping).
#                        Must be in the same unit as the metric's raw values.
#   saturation_cap     — optional; enables the `saturation` classification
#                        when the metric mean is within 5% of the cap.
#   related_metrics    — optional; drives metrics_related (static correlations).
#   thresholds         — optional; per-metric override of the kind defaults
#                        (significant_delta_pct, breach_ratio_for_regression,
#                        cv_for_noisy, spike_zscore).
#   aggregation        — optional; declares how snapshot/compare/related
#                        collapse the metric's time series into a single
#                        scalar. If omitted, DefaultAggregation() in
#                        internal/metrics/aggregation.go picks a reducer
#                        from the kind. Only override when the default is
#                        wrong for this specific metric:
#                          - ratio/hit-ratio/multiplier gauges → across_groups: mean
#                          - "longest/peak/high-water-mark" gauges → across_groups: max
#                          - per-entity totals where rolling-deploy pods may
#                            briefly publish duplicates → two-stage form:
#                              aggregation:
#                                group_by: [metric.labels.entity_id]
#                                within_group: max
#                                across_groups: sum
#                        Reducer values: mean | sum | max | min.
#
# !!! ACTION REQUIRED !!!
# The SLO thresholds below are generic starting points based on common SRE
# defaults. Tune them to YOUR workload — a 20ms disk latency SLO is fine for
# an SSD transactional workload but wrong for an analytical batch job, and a
# 5-minute PubSub lag SLO is too loose for realtime pipelines.

metrics:

  # =========================================================================
  # COMPUTE ENGINE (gce_instance)
  # =========================================================================

  "compute.googleapis.com/instance/cpu/utilization":
    kind: resource_utilization
    unit: ratio
    better_direction: down
    keywords: [vm, gce, instance, server, hardware]
    saturation_cap: 1.0
    slo_threshold: 0.85
    related_metrics:
      - "compute.googleapis.com/instance/cpu/scheduler_wait_time"
      - "compute.googleapis.com/instance/memory/balloon/ram_used"
      - "compute.googleapis.com/instance/disk/average_io_latency"

  "compute.googleapis.com/instance/cpu/scheduler_wait_time":
    kind: saturation
    unit: seconds
    better_direction: down
    keywords: [vm, gce, instance, server, hardware]
    related_metrics:
      - "compute.googleapis.com/instance/cpu/utilization"

  "compute.googleapis.com/instance/memory/balloon/ram_used":
    # Absolute bytes used; pair with ram_size (capacity denominator).
    # E2 family only — for other families use Ops Agent memory metrics.
    kind: resource_utilization
    unit: bytes
    better_direction: down
    keywords: [vm, gce, instance, server, hardware]
    related_metrics:
      - "compute.googleapis.com/instance/memory/balloon/ram_size"
      - "compute.googleapis.com/instance/memory/balloon/swap_in_bytes_count"
      - "compute.googleapis.com/instance/memory/balloon/swap_out_bytes_count"

  "compute.googleapis.com/instance/memory/balloon/swap_in_bytes_count":
    # Any sustained swap activity is a saturation signal — the VM is being
    # pushed beyond its resident memory.
    kind: saturation
    unit: bytes
    better_direction: down
    keywords: [vm, gce, instance, server, hardware]
    related_metrics:
      - "compute.googleapis.com/instance/memory/balloon/ram_used"

  "compute.googleapis.com/instance/disk/read_bytes_count":
    kind: throughput
    unit: bytes
    better_direction: none
    keywords: [vm, gce, instance, server, hardware]
    related_metrics:
      - "compute.googleapis.com/instance/disk/write_bytes_count"
      - "compute.googleapis.com/instance/disk/average_io_latency"

  "compute.googleapis.com/instance/disk/write_bytes_count":
    kind: throughput
    unit: bytes
    better_direction: none
    keywords: [vm, gce, instance, server, hardware]
    related_metrics:
      - "compute.googleapis.com/instance/disk/read_bytes_count"
      - "compute.googleapis.com/instance/disk/average_io_latency"

  "compute.googleapis.com/instance/disk/read_ops_count":
    kind: throughput
    unit: count
    better_direction: none
    keywords: [vm, gce, instance, server, hardware]
    related_metrics:
      - "compute.googleapis.com/instance/disk/write_ops_count"

  "compute.googleapis.com/instance/disk/write_ops_count":
    kind: throughput
    unit: count
    better_direction: none
    keywords: [vm, gce, instance, server, hardware]
    related_metrics:
      - "compute.googleapis.com/instance/disk/read_ops_count"

  "compute.googleapis.com/instance/disk/average_io_latency":
    # Default 20ms suitable for pd-ssd / pd-balanced transactional workloads.
    # For pd-standard bump to 100ms; for local SSD drop to 2ms.
    kind: latency
    unit: microseconds
    better_direction: down
    keywords: [vm, gce, instance, server, hardware]
    slo_threshold: 20000
    related_metrics:
      - "compute.googleapis.com/instance/disk/average_io_queue_depth"
      - "compute.googleapis.com/instance/cpu/utilization"

  "compute.googleapis.com/instance/disk/average_io_queue_depth":
    kind: saturation
    unit: count
    better_direction: down
    keywords: [vm, gce, instance, server, hardware]
    slo_threshold: 10
    related_metrics:
      - "compute.googleapis.com/instance/disk/average_io_latency"

  "compute.googleapis.com/instance/network/received_bytes_count":
    kind: throughput
    unit: bytes
    better_direction: none
    keywords: [vm, gce, instance, server, hardware]
    related_metrics:
      - "compute.googleapis.com/instance/network/sent_bytes_count"

  "compute.googleapis.com/instance/network/sent_bytes_count":
    kind: throughput
    unit: bytes
    better_direction: none
    keywords: [vm, gce, instance, server, hardware]
    related_metrics:
      - "compute.googleapis.com/instance/network/received_bytes_count"

  "compute.googleapis.com/instance/uptime":
    # DELTA: seconds-up-per-minute. Non-monotonic drop → VM restart.
    kind: availability
    unit: seconds
    better_direction: up
    keywords: [vm, gce, instance, server, hardware]
    related_metrics:
      - "compute.googleapis.com/instance/interruption_count"

  "compute.googleapis.com/instance/interruption_count":
    # BETA: infrastructure interruptions (host failures, preemption).
    kind: error_rate
    unit: count
    better_direction: down
    keywords: [vm, gce, instance, server, hardware]
    related_metrics:
      - "compute.googleapis.com/instance/uptime"

  # =========================================================================
  # CLOUD SQL (cloudsql_database)
  # =========================================================================

  "cloudsql.googleapis.com/database/cpu/utilization":
    kind: resource_utilization
    unit: ratio
    better_direction: down
    keywords: [database, rdbms, mysql, postgres, postgresql]
    saturation_cap: 1.0
    slo_threshold: 0.85
    related_metrics:
      - "cloudsql.googleapis.com/database/memory/utilization"
      - "cloudsql.googleapis.com/database/disk/utilization"
      - "cloudsql.googleapis.com/database/network/connections"

  "cloudsql.googleapis.com/database/memory/utilization":
    kind: resource_utilization
    unit: ratio
    better_direction: down
    keywords: [database, rdbms, mysql, postgres, postgresql]
    saturation_cap: 1.0
    slo_threshold: 0.90
    related_metrics:
      - "cloudsql.googleapis.com/database/cpu/utilization"
      - "cloudsql.googleapis.com/database/memory/total_usage"

  "cloudsql.googleapis.com/database/memory/total_usage":
    kind: resource_utilization
    unit: bytes
    better_direction: down
    keywords: [database, rdbms, mysql, postgres, postgresql]
    related_metrics:
      - "cloudsql.googleapis.com/database/memory/utilization"

  "cloudsql.googleapis.com/database/disk/utilization":
    # Cloud SQL does NOT auto-recover from disk-full — leave headroom for
    # auto-grow. 0.85 SLO gives time to react before the instance wedges.
    kind: saturation
    unit: ratio
    better_direction: down
    keywords: [database, rdbms, mysql, postgres, postgresql]
    saturation_cap: 1.0
    slo_threshold: 0.85
    related_metrics:
      - "cloudsql.googleapis.com/database/disk/bytes_used"
      - "cloudsql.googleapis.com/database/disk/quota"

  "cloudsql.googleapis.com/database/disk/bytes_used":
    kind: resource_utilization
    unit: bytes
    better_direction: down
    keywords: [database, rdbms, mysql, postgres, postgresql]
    related_metrics:
      - "cloudsql.googleapis.com/database/disk/utilization"
      - "cloudsql.googleapis.com/database/disk/quota"

  "cloudsql.googleapis.com/database/disk/quota":
    kind: resource_utilization
    unit: bytes
    better_direction: none
    keywords: [database, rdbms, mysql, postgres, postgresql]
    related_metrics:
      - "cloudsql.googleapis.com/database/disk/utilization"
      - "cloudsql.googleapis.com/database/disk/bytes_used"

  "cloudsql.googleapis.com/database/disk/read_ops_count":
    kind: throughput
    unit: count
    better_direction: none
    keywords: [database, rdbms, mysql, postgres, postgresql]
    related_metrics:
      - "cloudsql.googleapis.com/database/disk/write_ops_count"

  "cloudsql.googleapis.com/database/disk/write_ops_count":
    kind: throughput
    unit: count
    better_direction: none
    keywords: [database, rdbms, mysql, postgres, postgresql]
    related_metrics:
      - "cloudsql.googleapis.com/database/disk/read_ops_count"

  "cloudsql.googleapis.com/database/network/connections":
    # Connection count — no universal cap (depends on max_connections).
    # Override slo_threshold per instance if you want breach detection.
    kind: saturation
    unit: count
    better_direction: down
    keywords: [database, rdbms, mysql, postgres, postgresql]
    related_metrics:
      - "cloudsql.googleapis.com/database/cpu/utilization"
      - "cloudsql.googleapis.com/database/postgresql/num_backends"

  "cloudsql.googleapis.com/database/postgresql/num_backends":
    kind: saturation
    unit: count
    better_direction: down
    keywords: [database, rdbms, mysql, postgres, postgresql]
    related_metrics:
      - "cloudsql.googleapis.com/database/network/connections"
      - "cloudsql.googleapis.com/database/postgresql/transaction_count"

  "cloudsql.googleapis.com/database/postgresql/transaction_count":
    kind: throughput
    unit: count
    better_direction: none
    keywords: [database, rdbms, mysql, postgres, postgresql]
    related_metrics:
      - "cloudsql.googleapis.com/database/postgresql/num_backends"
      - "cloudsql.googleapis.com/database/postgresql/deadlock_count"

  "cloudsql.googleapis.com/database/postgresql/deadlock_count":
    # Any sustained non-zero deadlock rate is worth investigating.
    kind: error_rate
    unit: count
    better_direction: down
    keywords: [database, rdbms, mysql, postgres, postgresql]
    related_metrics:
      - "cloudsql.googleapis.com/database/postgresql/transaction_count"

  "cloudsql.googleapis.com/database/mysql/queries":
    kind: throughput
    unit: count
    better_direction: none
    keywords: [database, rdbms, mysql, postgres, postgresql]
    related_metrics:
      - "cloudsql.googleapis.com/database/mysql/questions"
      - "cloudsql.googleapis.com/database/cpu/utilization"

  "cloudsql.googleapis.com/database/mysql/questions":
    kind: throughput
    unit: count
    better_direction: none
    keywords: [database, rdbms, mysql, postgres, postgresql]
    related_metrics:
      - "cloudsql.googleapis.com/database/mysql/queries"

  "cloudsql.googleapis.com/database/mysql/innodb_deadlocks":
    kind: error_rate
    unit: count
    better_direction: down
    keywords: [database, rdbms, mysql, postgres, postgresql]
    related_metrics:
      - "cloudsql.googleapis.com/database/mysql/queries"

  "cloudsql.googleapis.com/database/replication/replica_lag":
    # Engine-agnostic replication lag. 30s default suits most OLTP replicas;
    # tune down to 5s for read-after-write patterns, up to 300s for analytics.
    kind: freshness
    unit: seconds
    better_direction: down
    keywords: [database, rdbms, mysql, postgres, postgresql]
    slo_threshold: 30
    related_metrics:
      - "cloudsql.googleapis.com/database/replication/network_lag"
      - "cloudsql.googleapis.com/database/cpu/utilization"

  "cloudsql.googleapis.com/database/replication/network_lag":
    kind: latency
    unit: seconds
    better_direction: down
    keywords: [database, rdbms, mysql, postgres, postgresql]
    slo_threshold: 1
    related_metrics:
      - "cloudsql.googleapis.com/database/replication/replica_lag"

  "cloudsql.googleapis.com/database/mysql/replication/seconds_behind_master":
    kind: freshness
    unit: seconds
    better_direction: down
    keywords: [database, rdbms, mysql, postgres, postgresql]
    slo_threshold: 30
    related_metrics:
      - "cloudsql.googleapis.com/database/cpu/utilization"

  "cloudsql.googleapis.com/database/up":
    # BOOL: 1 if reachable, 0 otherwise. DirectionUp means "lower is bad";
    # SLOThreshold=1 → any zero is a breach.
    kind: availability
    unit: bool
    better_direction: up
    keywords: [database, rdbms, mysql, postgres, postgresql]
    slo_threshold: 1
    related_metrics:
      - "cloudsql.googleapis.com/database/available_for_failover"
      - "cloudsql.googleapis.com/database/cpu/utilization"
      - "cloudsql.googleapis.com/database/disk/utilization"

  "cloudsql.googleapis.com/database/available_for_failover":
    kind: availability
    unit: bool
    better_direction: up
    keywords: [database, rdbms, mysql, postgres, postgresql]
    slo_threshold: 1
    related_metrics:
      - "cloudsql.googleapis.com/database/up"
      - "cloudsql.googleapis.com/database/replication/replica_lag"

  "cloudsql.googleapis.com/database/backup/last_backup_status":
    kind: availability
    unit: bool
    better_direction: up
    keywords: [database, rdbms, mysql, postgres, postgresql]
    related_metrics:
      - "cloudsql.googleapis.com/database/up"
      - "cloudsql.googleapis.com/database/disk/utilization"

  # =========================================================================
  # KUBERNETES ENGINE (k8s_container / k8s_pod / k8s_node)
  # =========================================================================

  "kubernetes.io/container/cpu/core_usage_time":
    # CUMULATIVE counter — raw value grows forever. metrics_snapshot's
    # alignment reducer converts this to a rate automatically.
    kind: resource_utilization
    unit: seconds
    better_direction: none
    keywords: [k8s, container]
    related_metrics:
      - "kubernetes.io/container/cpu/limit_utilization"
      - "kubernetes.io/container/cpu/request_utilization"

  "kubernetes.io/container/cpu/limit_utilization":
    # Near 1.0 means the container is throttled (CPU limits hit).
    kind: saturation
    unit: ratio
    better_direction: down
    keywords: [k8s, container]
    saturation_cap: 1.0
    slo_threshold: 0.90
    related_metrics:
      - "kubernetes.io/container/cpu/request_utilization"
      - "kubernetes.io/container/cpu/core_usage_time"

  "kubernetes.io/container/cpu/request_utilization":
    kind: resource_utilization
    unit: ratio
    better_direction: none
    keywords: [k8s, container]
    related_metrics:
      - "kubernetes.io/container/cpu/limit_utilization"

  "kubernetes.io/container/memory/used_bytes":
    kind: resource_utilization
    unit: bytes
    better_direction: down
    keywords: [k8s, container]
    related_metrics:
      - "kubernetes.io/container/memory/limit_utilization"
      - "kubernetes.io/container/restart_count"

  "kubernetes.io/container/memory/limit_utilization":
    # Near 1.0 = OOMKill imminent. Keep SLO at 0.85 for reaction time.
    kind: saturation
    unit: ratio
    better_direction: down
    keywords: [k8s, container]
    saturation_cap: 1.0
    slo_threshold: 0.85
    related_metrics:
      - "kubernetes.io/container/memory/used_bytes"
      - "kubernetes.io/container/restart_count"

  "kubernetes.io/container/memory/request_utilization":
    kind: resource_utilization
    unit: ratio
    better_direction: none
    keywords: [k8s, container]
    related_metrics:
      - "kubernetes.io/container/memory/limit_utilization"

  "kubernetes.io/container/restart_count":
    # Cumulative counter — rate matters, not absolute. Any non-zero delta
    # over a window indicates crashes/OOMKills.
    kind: error_rate
    unit: count
    better_direction: down
    keywords: [k8s, container]
    related_metrics:
      - "kubernetes.io/container/memory/limit_utilization"
      - "kubernetes.io/container/uptime"

  "kubernetes.io/container/uptime":
    kind: availability
    unit: seconds
    better_direction: up
    keywords: [k8s, container]
    related_metrics:
      - "kubernetes.io/container/restart_count"

  "kubernetes.io/container/ephemeral_storage/used_bytes":
    kind: resource_utilization
    unit: bytes
    better_direction: down
    keywords: [k8s, container]
    related_metrics:
      - "kubernetes.io/node/ephemeral_storage/used_bytes"

  "kubernetes.io/pod/volume/utilization":
    # Persistent volume fill ratio.
    kind: saturation
    unit: ratio
    better_direction: down
    keywords: [k8s, container]
    saturation_cap: 1.0
    slo_threshold: 0.85
    related_metrics:
      - "kubernetes.io/container/ephemeral_storage/used_bytes"
      - "kubernetes.io/node/ephemeral_storage/used_bytes"

  "kubernetes.io/pod/network/received_bytes_count":
    kind: throughput
    unit: bytes
    better_direction: none
    keywords: [k8s, container]
    related_metrics:
      - "kubernetes.io/pod/network/sent_bytes_count"

  "kubernetes.io/pod/network/sent_bytes_count":
    kind: throughput
    unit: bytes
    better_direction: none
    keywords: [k8s, container]
    related_metrics:
      - "kubernetes.io/pod/network/received_bytes_count"

  "kubernetes.io/pod/latencies/pod_first_ready":
    # Scheduling + pull + start + readiness — this is the "cold start" SLI.
    # 60s is a reasonable default; tight SLOs drop this to 20s.
    kind: latency
    unit: seconds
    better_direction: down
    keywords: [k8s, container]
    slo_threshold: 60
    related_metrics:
      - "kubernetes.io/container/restart_count"
      - "kubernetes.io/node/cpu/allocatable_utilization"
      - "kubernetes.io/node/memory/allocatable_utilization"

  "kubernetes.io/node/cpu/allocatable_utilization":
    kind: saturation
    unit: ratio
    better_direction: down
    keywords: [k8s, container]
    saturation_cap: 1.0
    slo_threshold: 0.85
    related_metrics:
      - "kubernetes.io/node/memory/allocatable_utilization"
      - "kubernetes.io/node/status_condition"

  "kubernetes.io/node/cpu/allocatable_cores":
    kind: resource_utilization
    unit: cores
    better_direction: none
    keywords: [k8s, container]
    related_metrics:
      - "kubernetes.io/node/cpu/allocatable_utilization"
      - "kubernetes.io/node/memory/allocatable_bytes"

  "kubernetes.io/node/memory/allocatable_utilization":
    kind: saturation
    unit: ratio
    better_direction: down
    keywords: [k8s, container]
    saturation_cap: 1.0
    slo_threshold: 0.85
    related_metrics:
      - "kubernetes.io/node/cpu/allocatable_utilization"
      - "kubernetes.io/node/status_condition"

  "kubernetes.io/node/memory/allocatable_bytes":
    kind: resource_utilization
    unit: bytes
    better_direction: none
    keywords: [k8s, container]
    related_metrics:
      - "kubernetes.io/node/memory/allocatable_utilization"
      - "kubernetes.io/node/cpu/allocatable_cores"

  "kubernetes.io/node/ephemeral_storage/used_bytes":
    kind: saturation
    unit: bytes
    better_direction: down
    keywords: [k8s, container]
    related_metrics:
      - "kubernetes.io/container/ephemeral_storage/used_bytes"

  "kubernetes.io/node/network/received_bytes_count":
    kind: throughput
    unit: bytes
    better_direction: none
    keywords: [k8s, container]
    related_metrics:
      - "kubernetes.io/pod/network/received_bytes_count"
      - "kubernetes.io/pod/network/sent_bytes_count"

  "kubernetes.io/node/status_condition":
    # Labeled by {condition, status}. Filter condition=Ready,status=true
    # for availability SLIs; non-Ready conditions (DiskPressure,
    # MemoryPressure, PIDPressure, NetworkUnavailable) indicate node issues.
    kind: availability
    unit: bool
    better_direction: up
    keywords: [k8s, container]
    related_metrics:
      - "kubernetes.io/node/cpu/allocatable_utilization"
      - "kubernetes.io/node/memory/allocatable_utilization"
      - "kubernetes.io/node/ephemeral_storage/used_bytes"

  "kubernetes.io/autoscaler/container/cpu/per_replica_recommended_request_cores":
    # HPA/VPA recommended CPU — sustained growth indicates scaling pressure
    # the current replica count isn't handling.
    kind: saturation
    unit: cores
    better_direction: none
    keywords: [k8s, container]
    related_metrics:
      - "kubernetes.io/container/cpu/limit_utilization"

  # =========================================================================
  # PUB/SUB (pubsub_topic / pubsub_subscription)
  # =========================================================================

  "pubsub.googleapis.com/topic/send_request_count":
    # Grouped by response_code label — filter result=ok for throughput,
    # result!=ok via metrics_top_contributors(dimension="metric.labels.response_code")
    # to expose error breakdowns.
    kind: throughput
    unit: count
    better_direction: none
    keywords: [messaging, queue, broker]
    related_metrics:
      - "pubsub.googleapis.com/topic/byte_cost"

  "pubsub.googleapis.com/topic/byte_cost":
    kind: resource_utilization
    unit: bytes
    better_direction: none
    keywords: [messaging, queue, broker]
    related_metrics:
      - "pubsub.googleapis.com/topic/send_request_count"
      - "pubsub.googleapis.com/topic/message_sizes"

  "pubsub.googleapis.com/topic/message_sizes":
    kind: business_kpi
    unit: bytes
    better_direction: none
    keywords: [messaging, queue, broker]
    related_metrics:
      - "pubsub.googleapis.com/topic/send_request_count"
      - "pubsub.googleapis.com/topic/byte_cost"

  "pubsub.googleapis.com/subscription/pull_request_count":
    kind: throughput
    unit: count
    better_direction: none
    keywords: [messaging, queue, broker]
    related_metrics:
      - "pubsub.googleapis.com/subscription/sent_message_count"
      - "pubsub.googleapis.com/subscription/ack_message_count"

  "pubsub.googleapis.com/subscription/sent_message_count":
    kind: throughput
    unit: count
    better_direction: none
    keywords: [messaging, queue, broker]
    related_metrics:
      - "pubsub.googleapis.com/subscription/ack_message_count"
      - "pubsub.googleapis.com/subscription/num_undelivered_messages"

  "pubsub.googleapis.com/subscription/ack_message_count":
    kind: throughput
    unit: count
    better_direction: none
    keywords: [messaging, queue, broker]
    related_metrics:
      - "pubsub.googleapis.com/subscription/sent_message_count"
      - "pubsub.googleapis.com/subscription/ack_latencies"

  "pubsub.googleapis.com/subscription/ack_latencies":
    # Time between delivery and ack. 60s default gives room for typical
    # consumers; tighten for realtime pipelines, loosen for batch workers.
    kind: latency
    unit: milliseconds
    better_direction: down
    keywords: [messaging, queue, broker]
    slo_threshold: 60000
    related_metrics:
      - "pubsub.googleapis.com/subscription/ack_message_count"
      - "pubsub.googleapis.com/subscription/oldest_unacked_message_age"

  "pubsub.googleapis.com/subscription/num_undelivered_messages":
    # Backlog depth. 1000 is a generic default — tune to your consumer
    # throughput and acceptable lag.
    kind: saturation
    unit: count
    better_direction: down
    keywords: [messaging, queue, broker]
    slo_threshold: 1000
    related_metrics:
      - "pubsub.googleapis.com/subscription/oldest_unacked_message_age"
      - "pubsub.googleapis.com/subscription/sent_message_count"
      - "pubsub.googleapis.com/subscription/backlog_bytes"

  "pubsub.googleapis.com/subscription/backlog_bytes":
    kind: saturation
    unit: bytes
    better_direction: down
    keywords: [messaging, queue, broker]
    related_metrics:
      - "pubsub.googleapis.com/subscription/num_undelivered_messages"

  "pubsub.googleapis.com/subscription/oldest_unacked_message_age":
    # Primary lag / staleness SLI for Pub/Sub. Auto-detected as freshness
    # by the oldest_unacked substring match, but we set an explicit SLO here.
    # 300s = 5 minutes is loose — tighten for realtime (30s), loosen for batch.
    kind: freshness
    unit: seconds
    better_direction: down
    keywords: [messaging, queue, broker]
    slo_threshold: 300
    related_metrics:
      - "pubsub.googleapis.com/subscription/num_undelivered_messages"
      - "pubsub.googleapis.com/subscription/ack_latencies"
      - "pubsub.googleapis.com/subscription/sent_message_count"

  "pubsub.googleapis.com/subscription/dead_letter_message_count":
    # Any sustained non-zero rate = messages failing delivery after retries.
    kind: error_rate
    unit: count
    better_direction: down
    keywords: [messaging, queue, broker]
    related_metrics:
      - "pubsub.googleapis.com/subscription/push_request_count"
      - "pubsub.googleapis.com/subscription/ack_latencies"

  "pubsub.googleapis.com/subscription/push_request_count":
    kind: throughput
    unit: count
    better_direction: none
    keywords: [messaging, queue, broker]
    related_metrics:
      - "pubsub.googleapis.com/subscription/push_request_latencies"
      - "pubsub.googleapis.com/subscription/dead_letter_message_count"

  "pubsub.googleapis.com/subscription/push_request_latencies":
    # Push endpoint response latency — this measures YOUR push target.
    # Unit is microseconds (not milliseconds like ack_latencies).
    kind: latency
    unit: microseconds
    better_direction: down
    keywords: [messaging, queue, broker]
    slo_threshold: 5000000
    related_metrics:
      - "pubsub.googleapis.com/subscription/push_request_count"
      - "pubsub.googleapis.com/subscription/dead_letter_message_count"

  "pubsub.googleapis.com/subscription/mod_ack_deadline_request_count":
    # Elevated rate indicates slow consumers extending leases on in-flight
    # messages. Correlate with ack_latencies spikes.
    kind: throughput
    unit: count
    better_direction: none
    keywords: [messaging, queue, broker]
    related_metrics:
      - "pubsub.googleapis.com/subscription/ack_latencies"
      - "pubsub.googleapis.com/subscription/oldest_unacked_message_age"

  "pubsub.googleapis.com/subscription/byte_cost":
    kind: resource_utilization
