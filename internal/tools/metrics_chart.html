<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Metrics Chart</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;margin:0}
/* Light theme defaults; .dark class toggled by host-context-changed notification. */
:root{color-scheme:light dark}
:root.dark body{background:#0d1117;color:#e6edf3}
:root.dark .title{color:#8b949e}
:root.dark .msg{color:#8b949e}
body{background:#ffffff;color:#1f2328;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:8px 14px 6px}
.title{font-size:11px;color:#57606a;margin-bottom:4px;word-break:break-all}
.wrap{position:relative;width:100%;height:180px}
svg{display:block;width:100%;height:100%}
.msg{color:#57606a;font-size:12px;padding-top:8px}
</style>
</head>
<body>
<div class="title" id="title">Loading…</div>
<div class="wrap" id="wrap">
  <p class="msg" id="msg">Waiting for data…</p>
  <svg id="chart" style="display:none" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<script>
(function(){
'use strict';

// ── MCP Apps bridge ──────────────────────────────────────────────────────────
var pending = {}, reqId = 0;

function send(msg) { window.parent.postMessage(msg, '*'); }

function request(method, params) {
  return new Promise(function(resolve, reject) {
    var id = ++reqId;
    var timer = setTimeout(function() {
      delete pending[id];
      reject(new Error('timeout: ' + method));
    }, 5000);
    pending[id] = function(result, err) {
      clearTimeout(timer);
      if (err) reject(err); else resolve(result);
    };
    send({jsonrpc:'2.0', id:id, method:method, params:params||{}});
  });
}

window.addEventListener('message', function(e) {
  var msg = e.data;
  if (!msg || msg.jsonrpc !== '2.0') return;

  // Notifications carry a method — check first to avoid id-collision misrouting.
  if (msg.method) {
    if (msg.method === 'ui/notifications/host-context-changed') {
      var theme = msg.params && msg.params.theme;
      if (theme) applyTheme(theme);
      return;
    }
    if (msg.method === 'ui/notifications/tool-result') {
      var sc = msg.params && msg.params.structuredContent;
      if (sc) {
        try {
          renderChart(sc);
        } catch(e) {
          var msgEl2 = document.getElementById('msg');
          var svgEl2 = document.getElementById('chart');
          if (msgEl2) { msgEl2.textContent = 'Chart error: ' + (e && e.message ? e.message : String(e)); msgEl2.style.display = ''; }
          if (svgEl2) svgEl2.style.display = 'none';
          if (typeof console !== 'undefined') console.error('[metrics-chart] renderChart:', e);
        }
      } else {
        if (typeof console !== 'undefined') console.warn('[metrics-chart] tool-result missing structuredContent', msg.params);
      }
    }
    return;
  }

  if (msg.id != null && pending[msg.id]) {
    var cb = pending[msg.id];
    delete pending[msg.id];
    if (msg.error) cb(null, new Error(msg.error.message || 'rpc error'));
    else           cb(msg.result || {});
  }
});

request('ui/initialize', {
  protocolVersion: '2026-01-26',
  appInfo: {name:'metrics_snapshot', version:'1.0.0'},
  appCapabilities: {}
}).then(function() {
}).catch(function(err) {
  if (typeof console !== 'undefined') {
    var isTimeout = err && err.message && err.message.indexOf('timeout:') === 0;
    if (isTimeout) {
      console.warn('[metrics-chart] ui/initialize timed out, proceeding anyway');
    } else {
      console.error('[metrics-chart] ui/initialize protocol error:', err && err.message);
    }
  }
}).finally(function() {
  // Always send initialized so the host unhides the widget container.
  // If ui/initialize timed out the host is still waiting for this signal.
  send({jsonrpc:'2.0', method:'ui/notifications/initialized', params:{}});
});

// Notify the host of content size changes so it can resize the iframe.
// Dedup: only send when dimensions actually change to avoid feedback loops.
var lastSzW = 0, lastSzH = 0;
if (typeof ResizeObserver !== 'undefined') {
  try {
    new ResizeObserver(function() {
      try {
        var w = document.documentElement.scrollWidth;
        var h = document.documentElement.scrollHeight;
        if (w === lastSzW && h === lastSzH) return;
        lastSzW = w; lastSzH = h;
        send({jsonrpc:'2.0', method:'ui/notifications/size-changed', params:{width:w, height:h}});
      } catch(e) {
        if (typeof console !== 'undefined') console.warn('[metrics-chart] size-changed:', e);
      }
    }).observe(document.body);
  } catch(e) {
    if (typeof console !== 'undefined') console.warn('[metrics-chart] ResizeObserver:', e);
  }
}

// ── Theme ─────────────────────────────────────────────────────────────────────
// Toggle .dark on <html> so CSS variables switch correctly.
// Falls back to prefers-color-scheme until the host sends host-context-changed.
function applyTheme(theme) {
  document.documentElement.classList.toggle('dark', theme === 'dark');
}

// Apply OS preference immediately so there's no flash on load.
if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
  applyTheme('dark');
}

// ── SVG chart ────────────────────────────────────────────────────────────────
function escXML(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmt(v, unit) {
  var a = Math.abs(v);
  // Ratio metrics are most readable as percentages.
  if (unit === 'ratio') {
    var pct = v * 100;
    return (Math.abs(pct) < 10 ? pct.toPrecision(3) : pct.toFixed(1)) + '%';
  }
  // Byte units.
  if (unit === 'By' || unit === 'By/s') {
    var bsuf = unit === 'By/s' ? 'B/s' : 'B';
    return a >= 1e9 ? (v/1e9).toFixed(1)+'G'+bsuf
         : a >= 1e6 ? (v/1e6).toFixed(1)+'M'+bsuf
         : a >= 1e3 ? (v/1e3).toFixed(1)+'K'+bsuf
         : v.toFixed(0)+bsuf;
  }
  var s = a >= 1e9  ? (v/1e9).toFixed(1)+'B'
        : a >= 1e6  ? (v/1e6).toFixed(1)+'M'
        : a >= 1e3  ? (v/1e3).toFixed(1)+'K'
        : a >= 10   ? v.toFixed(1)
        : a >= 1    ? v.toPrecision(3)
        : a >= 0.001 ? v.toPrecision(2)
        : v === 0   ? '0'
                    : v.toPrecision(2);
  return (unit && unit !== '1') ? s+'\u00a0'+escXML(unit) : s;
}

function renderChart(sc) {
  var titleEl = document.getElementById('title');
  var msgEl   = document.getElementById('msg');
  var svgEl   = document.getElementById('chart');
  if (!titleEl || !msgEl || !svgEl) {
    throw new Error('required DOM elements missing (title/msg/chart)');
  }

  var pts  = sc.chart_points || [];
  var metric  = sc.metric_type || '';
  var unit    = sc.unit || '';
  var baseline = (typeof sc.baseline === 'number' && sc.baseline_reliable) ? sc.baseline : null;

  titleEl.textContent = metric;

  if (!pts.length) {
    msgEl.textContent = 'No data available';
    msgEl.style.display = '';
    svgEl.style.display = 'none';
    return;
  }

  msgEl.style.display = 'none';
  svgEl.style.display = 'block';

  var vals = pts.map(function(p) {
    if (typeof p.v !== 'number' || !isFinite(p.v)) {
      throw new Error('invalid point value: ' + JSON.stringify(p.v));
    }
    return p.v;
  });
  var times = pts.map(function(p){ return p.ts; });
  var minV = Math.min.apply(null, vals);
  var maxV = Math.max.apply(null, vals);
  if (baseline !== null) { minV = Math.min(minV, baseline); maxV = Math.max(maxV, baseline); }
  var range = maxV - minV || 1;

  // SVG viewport
  var W = 560, H = 160;
  var padL = 46, padR = 8, padT = 12, padB = 24;
  var cW = W - padL - padR, cH = H - padT - padB;

  function xPos(i) { return padL + (i / (pts.length - 1 || 1)) * cW; }
  function yPos(v) { return padT + (1 - (v - minV) / range) * cH; }

  // Build SVG string
  // Include id="chart" so getElementById('chart') keeps working on re-renders.
  var svg = '<svg id="chart" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">';

  // Grid lines (4 horizontal)
  for (var g = 0; g <= 4; g++) {
    var gy = padT + (g/4) * cH;
    var gv = maxV - (g/4) * range;
    svg += '<line x1="'+padL+'" y1="'+gy+'" x2="'+(W-padR)+'" y2="'+gy+'" stroke="#21262d" stroke-width="1"/>';
    svg += '<text x="'+(padL-4)+'" y="'+(gy+4)+'" text-anchor="end" fill="#6e7681" font-size="9" font-family="-apple-system,sans-serif">'+fmt(gv,unit)+'</text>';
  }

  // X-axis labels (up to 6)
  var step = Math.max(1, Math.floor(pts.length / 6));
  for (var xi = 0; xi < pts.length; xi += step) {
    var xp = xPos(xi);
    var t = new Date(times[xi]*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    svg += '<text x="'+xp+'" y="'+(H-6)+'" text-anchor="middle" fill="#6e7681" font-size="9" font-family="-apple-system,sans-serif">'+t+'</text>';
  }

  // Baseline reference line
  if (baseline !== null) {
    var by = yPos(baseline);
    svg += '<line x1="'+padL+'" y1="'+by+'" x2="'+(W-padR)+'" y2="'+by+'" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.8"/>';
  }

  // Fill area under line
  if (pts.length > 1) {
    var fillPath = 'M'+xPos(0)+','+yPos(vals[0]);
    for (var fi = 1; fi < pts.length; fi++) fillPath += ' L'+xPos(fi)+','+yPos(vals[fi]);
    fillPath += ' L'+xPos(pts.length-1)+','+(padT+cH)+' L'+xPos(0)+','+(padT+cH)+' Z';
    svg += '<path d="'+fillPath+'" fill="#4e9af1" fill-opacity="0.08"/>';

    // Main line
    var linePath = 'M'+xPos(0)+','+yPos(vals[0]);
    for (var li = 1; li < pts.length; li++) linePath += ' L'+xPos(li)+','+yPos(vals[li]);
    svg += '<path d="'+linePath+'" fill="none" stroke="#4e9af1" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';
  } else if (pts.length === 1) {
    svg += '<circle cx="'+xPos(0)+'" cy="'+yPos(vals[0])+'" r="3" fill="#4e9af1"/>';
  }

  svg += '</svg>';
  svgEl.outerHTML = svg;
}

})();
</script>
</body>
</html>
